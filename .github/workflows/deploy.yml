name: Deploy to production server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check required SSH secrets
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          missing=0
          if [ -z "$SSH_KEY" ]; then echo "::error::Missing GitHub secret SSH_KEY"; missing=1; fi
          if [ -z "$SSH_HOST" ]; then echo "::error::Missing GitHub secret SSH_HOST"; missing=1; fi
          if [ -z "$SSH_USER" ]; then echo "::error::Missing GitHub secret SSH_USER"; missing=1; fi
          exit $missing

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 20 -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /var/www/paytochina
            git config --global --add safe.directory /var/www/paytochina
            git fetch --all
            git reset --hard origin/main
            echo "Deploying commit: $(git rev-parse --short HEAD) - $(git log -1 --pretty=%s)"
            export PATH="$HOME/.bun/bin:$PATH"
            bun install --frozen-lockfile || bun install
            NITRO_PRESET=node-server bun run build
            HOST=0.0.0.0 PORT=3000 pm2 restart paytochina --update-env || HOST=0.0.0.0 PORT=3000 pm2 start .output/server/index.mjs --name paytochina --update-env
            pm2 save
          EOF
